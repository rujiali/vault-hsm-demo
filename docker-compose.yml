services:

  vault-hsm:
    image: hashicorp/vault-enterprise:1.21.4-ent
    container_name: vault-hsm
    user: "root"
    ports:
      - "8201:8200"
    environment:
      VAULT_LICENSE: ${VAULT_LICENSE}
      VAULT_ADDR: http://0.0.0.0:8200
    cap_add:
      - IPC_LOCK
    volumes:
      - ./config/vault-hsm.hcl:/vault/config/vault.hcl
      - ./data/vault-hsm:/vault/data
    command: vault server -config=/vault/config/vault.hcl
    networks:
      - vault-net
    healthcheck:
      test: ["CMD", "sh", "-c", "vault status 2>/dev/null | grep -q 'Sealed.*false'"]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 5s

  vault-main:
    image: hashicorp/vault-enterprise:1.21.4-ent
    container_name: vault-main
    user: "root"
    depends_on:
      vault-hsm:
        condition: service_healthy
    ports:
      - "8200:8200"
    environment:
      VAULT_LICENSE: ${VAULT_LICENSE}
      VAULT_ADDR: http://0.0.0.0:8200
      VAULT_TOKEN: ${VAULT_HSM_TOKEN}
    cap_add:
      - IPC_LOCK
    volumes:
      - ./config/vault-main.hcl:/vault/config/vault.hcl
      - ./data/vault-main:/vault/data
    command: vault server -config=/vault/config/vault.hcl
    networks:
      - vault-net


  demo-app:
    build: ./app
    container_name: demo-app
    depends_on:
      vault-hsm:
        condition: service_healthy
    ports:
      - "5001:5000"
    environment:
      VAULT_ADDR: http://vault-main:8200
    networks:
      - vault-net

networks:
  vault-net:
    driver: bridge
