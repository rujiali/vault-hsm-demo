services:

  vault-hsm:
    # Standard Vault Enterprise — KMIP secrets engine is included in the ent binary.
    # Acts as the KMIP key server (HSM substitute). Shamir-unsealed manually via init-hsm.sh.
    image: hashicorp/vault-enterprise:2.0-ent
    container_name: vault-hsm
    user: "root"
    ports:
      - "8201:8200"  # Vault API
      - "5696:5696"  # KMIP endpoint (for host-side debugging; vault-main reaches it via Docker network)
    environment:
      VAULT_LICENSE: ${VAULT_LICENSE}
      VAULT_ADDR: http://0.0.0.0:8200
    cap_add:
      - IPC_LOCK
    volumes:
      - ./config/vault-hsm.hcl:/vault/config/vault.hcl
      - ./data/vault-hsm:/vault/data
    command: vault server -config=/vault/config/vault.hcl
    networks:
      - vault-net
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://127.0.0.1:8200/v1/sys/health"]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 5s

  vault-main:
    # Custom image: Ubuntu 22.04 + vault HSM binary (1.21.4+ent.hsm) + libvault-pkcs11.so.
    # Alpine cannot load libvault-pkcs11.so (glibc vs musl); Ubuntu is required.
    # linux/amd64 required — vault-pkcs11-provider is only published for amd64.
    build:
      context: .
      dockerfile: vault-main.Dockerfile
    platform: linux/amd64
    container_name: vault-main
    user: "root"
    depends_on:
      vault-hsm:
        condition: service_healthy
    ports:
      - "8200:8200"
    environment:
      VAULT_LICENSE: ${VAULT_LICENSE}
      VAULT_ADDR: http://0.0.0.0:8200
    cap_add:
      - IPC_LOCK
    volumes:
      - ./config/vault-main.hcl:/vault/config/vault.hcl
      - ./data/vault-main:/vault/data
      # libvault-pkcs11.so reads this for KMIP server address and mTLS certs
      - ./config/vault-pkcs11-provider.hcl:/etc/vault-pkcs11.hcl:ro
      # mTLS credentials generated by init-hsm.sh
      - ./certs:/vault/certs:ro
    command: vault server -config=/vault/config/vault.hcl
    networks:
      - vault-net

  demo-app:
    build: ./app
    container_name: demo-app
    ports:
      - "5001:5000"
    environment:
      VAULT_ADDR: http://vault-main:8200
    volumes:
      - ./vault-main-init.json:/app/vault-main-init.json:ro
    networks:
      - vault-net

networks:
  vault-net:
    driver: bridge
